<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Education | Triona Lee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/education.css">
</head>
<body>
<nav id="main-nav"></nav>

<main class="page page-standalone" id="page-education">
  <div class="inner-page">
    <div class="section-label">Academic Background</div>
    <h1 class="section-title">Education &amp; Coursework</h1>
    <div class="edu-grid">

      <!-- LEFT: degrees, achievements, certs (filled by render-education.js) -->
      <div>
        <div class="edu-section-title">Education</div>
        <div class="edu-entries"></div>

        <div class="edu-section-title edu-section-title--spaced">Achievements</div>
        <div class="cert-list achievements-list"></div>

        <div class="edu-section-title edu-section-title--spaced">Certifications</div>
        <div class="cert-list certifications-list"></div>
      </div>

      <!-- RIGHT: module tabs + accordions (structure fixed, content filled by render-education.js) -->
      <div>
        <div class="edu-section-title">Core Modules</div>

        <div class="module-tabs">
          <button class="module-tab-btn active" data-tab="sit">SIT × UofG</button>
          <button class="module-tab-btn" data-tab="tp">Temasek Poly</button>
        </div>

        <div class="module-panel active" id="panel-sit">
          <div class="year-group">
            <button class="year-toggle open">Year 2 <span class="chevron">▲</span></button>
            <div class="year-courses open" id="sit-y2-courses"></div>
          </div>
          <div class="year-group">
            <button class="year-toggle">Year 1 <span class="chevron">▲</span></button>
            <div class="year-courses" id="sit-y1-courses"></div>
          </div>
        </div>

        <div class="module-panel" id="panel-tp">
          <div class="year-group">
            <button class="year-toggle open">Year 1 <span class="chevron">▲</span></button>
            <div class="year-courses open" id="tp-y1-courses"></div>
          </div>
          <div class="year-group">
            <button class="year-toggle">Internship — DBS Bank <span class="chevron">▲</span></button>
            <div class="year-courses" id="tp-intern-courses"></div>
          </div>
          <div class="year-group">
            <button class="year-toggle">Year 2 <span class="chevron">▲</span></button>
            <div class="year-courses" id="tp-y2-courses"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<script>
  document.querySelectorAll('.module-tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.module-tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.module-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });
  document.querySelectorAll('.year-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const courses = btn.nextElementSibling;
      const isOpen = courses.classList.contains('open');
      btn.classList.toggle('open', !isOpen);
      courses.classList.toggle('open', !isOpen);
    });
  });
</script>
<script src="assets/js/data.js"></script>
<script src="assets/js/data-projects.js"></script>
<script src="assets/js/render-education.js"></script>
<script src="assets/js/nav-bar.js"></script>
</body>
</html>
