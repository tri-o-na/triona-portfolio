<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project | Triona Lee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/projects.css">
</head>
<body>

<nav id="main-nav"></nav>

<main class="page page-standalone" id="page-project-detail">

  <!-- ① Feature wall — full-width image or placeholder, sits above everything -->
  <!-- <div class="detail-feature-wall" id="detail-feature-wall"></div> -->

  <div class="inner-page">

    <!-- Not found state -->
    <div id="detail-not-found" style="display:none; padding-top:48px;">
      <p style="color:var(--forest-mid);">Project not found. <a href="projects.html" style="color:var(--forest-mid);">Return to projects &rarr;</a></p>
    </div>

    <div id="detail-content">

      <!-- ② Breadcrumb -->
      <div class="detail-breadcrumb">
        <a href="projects.html" class="breadcrumb-back">&larr; All Projects</a>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-current" id="detail-breadcrumb-title"></span>
      </div>

      <!-- ③ Project header (title, badges, module, tags) -->
      <div class="detail-header">
        <div class="detail-header-text">
          <div class="detail-meta-row">
            <span class="detail-id" id="detail-id"></span>
            <span class="detail-school-badge" id="detail-school-badge"></span>
            <span class="detail-ongoing" id="detail-ongoing" style="display:none;">Ongoing</span>
          </div>
          <h1 class="detail-title" id="detail-title"></h1>
          <p class="detail-module" id="detail-module"></p>
          <div class="detail-tags" id="detail-tags"></div>
          <!-- GitHub button sits below tags -->
          <a class="detail-github-btn" id="detail-github-btn" href="#" target="_blank" rel="noreferrer" style="display:none;">
            ↗ View on GitHub
          </a>
        </div>
        <div class="detail-header-image" id="detail-header-image">
          <img id="detail-header-img" src="" alt="">
        </div>
      </div>

      <!-- ④ Two-col: description (left) + sidebar (right) -->
      <div class="detail-body">

        <div class="detail-main">
          <div class="detail-section">
            <div class="detail-section-label">About this project</div>
            <p class="detail-full-desc" id="detail-full-desc"></p>
          </div>

          <!-- ⑤ Embedded Google Drive previews (reports, slides, etc.) -->
          <div id="detail-embeds"></div>
        </div>

        <aside class="detail-sidebar">

          <!-- Extra links listed in sidebar too (open in new tab) -->
          <div class="detail-sidebar-block" id="detail-sidebar-links-wrap" style="display:none;">
            <div class="detail-sidebar-label">Documents</div>
            <div id="detail-sidebar-links"></div>
          </div>

          <div class="detail-sidebar-block">
            <div class="detail-sidebar-label">Category</div>
            <div class="detail-sidebar-value" id="detail-sidebar-type"></div>
          </div>

          <div class="detail-sidebar-block">
            <div class="detail-sidebar-label">School</div>
            <div class="detail-sidebar-value" id="detail-sidebar-school"></div>
          </div>

          <div class="detail-sidebar-block">
            <div class="detail-sidebar-label">Year &amp; Term</div>
            <div class="detail-sidebar-value" id="detail-sidebar-term"></div>
          </div>

        </aside>
      </div>

    </div><!-- /detail-content -->
  </div>
</main>

<script src="assets/js/data-projects.js"></script>
<script src="assets/js/render-project-detail.js"></script>
<script src="assets/js/nav-bar.js"></script>
</body>
</html>
