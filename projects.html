<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects | Triona Lee</title>
<meta name="description" content="Triona Lee's projects — full-stack web apps, AI/ML systems, cloud infrastructure, mobile apps, IoT, and more.">
<meta property="og:title" content="Projects — Triona Lee">
<meta property="og:description" content="Triona Lee's projects — full-stack web apps, AI/ML systems, cloud infrastructure, mobile apps, IoT, and more.">
<meta property="og:image" content="assets/images/profile.jpg">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" type="image/png" href="assets/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/projects.css">
</head>
<body>
<nav id="main-nav"></nav>

<main class="page page-standalone" id="page-projects">
  <div class="inner-page">
    <div class="section-label">Portfolio</div>
    <h1 class="section-title">Projects</h1>

    <!-- Mobile filter dropdown (custom) -->
    <div class="proj-filter-select-wrap" id="proj-filter-select-wrap">
      <button class="proj-custom-select" id="proj-custom-select" aria-haspopup="listbox" aria-expanded="false">
        <span class="pcs-dot pcs-dot-all"></span>
        <span class="pcs-label" id="pcs-label">All</span>
        <svg class="pcs-arrow" width="11" height="7" viewBox="0 0 11 7" fill="none"><path d="M1 1l4.5 4.5L10 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <ul class="pcs-dropdown" id="pcs-dropdown" role="listbox">
        <li class="pcs-option" data-filter="all"><span class="pcs-dot pcs-dot-all"></span>All</li>
        <li class="pcs-option" data-filter="design"><span class="pcs-dot pcs-dot-design"></span>Front-End &amp; Design</li>
        <li class="pcs-option" data-filter="fullstack"><span class="pcs-dot pcs-dot-fullstack"></span>Full-Stack</li>
        <li class="pcs-option" data-filter="backend"><span class="pcs-dot pcs-dot-backend"></span>Back-End Dev</li>
        <li class="pcs-option" data-filter="ai"><span class="pcs-dot pcs-dot-ai"></span>AI &amp; ML</li>
        <li class="pcs-option" data-filter="cloud"><span class="pcs-dot pcs-dot-cloud"></span>Cloud</li>
        <li class="pcs-option" data-filter="data"><span class="pcs-dot pcs-dot-data"></span>Data &amp; Algo</li>
        <li class="pcs-option" data-filter="iot"><span class="pcs-dot pcs-dot-iot"></span>IoT &amp; Networks</li>
        <li class="pcs-option" data-filter="systems"><span class="pcs-dot pcs-dot-systems"></span>Systems</li>
      </ul>
    </div>

    <!-- Icon-type filter pills -->
    <div class="proj-filter-bar">
      <button class="proj-filter-btn active" data-filter="all">All</button>
      <button class="proj-filter-btn" data-filter="design">
        <span class="filter-dot design"></span>Front-End &amp; Design
      </button>
      <button class="proj-filter-btn" data-filter="fullstack">
        <span class="filter-dot fullstack"></span>Full-Stack
      </button>
      <button class="proj-filter-btn" data-filter="backend">
        <span class="filter-dot backend"></span>Back-End Dev
      </button>
      <button class="proj-filter-btn" data-filter="ai">
        <span class="filter-dot ai"></span>AI &amp; ML
      </button>
      <button class="proj-filter-btn" data-filter="cloud">
        <span class="filter-dot cloud"></span>Cloud
      </button>
      <button class="proj-filter-btn" data-filter="data">
        <span class="filter-dot data"></span>Data &amp; Algo
      </button>
      <button class="proj-filter-btn" data-filter="iot">
        <span class="filter-dot iot"></span>IoT &amp; Networks
      </button>
      <button class="proj-filter-btn" data-filter="systems">
        <span class="filter-dot systems"></span>Systems
      </button>
    </div>

    <!-- Cards injected here by render-projects.js, grouped by icon -->
    <div id="projects-grid"></div>
  </div>
</main>

<noscript><p style="font-family:sans-serif;text-align:center;padding:40px">Please enable JavaScript to view this portfolio.</p></noscript>
<script src="assets/js/data-projects.js"></script>
<script src="assets/js/render-projects.js"></script>
<script src="assets/js/nav-bar.js"></script>
</body>
</html>
